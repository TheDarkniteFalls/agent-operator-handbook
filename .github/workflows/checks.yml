name: checks

on:
  push:
  pull_request:

jobs:
  starter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python3 scripts/build_starter_bundle.py --check
      - run: python3 scripts/check_starter_bundle.py
      - run: python3 -m py_compile scripts/build_starter_bundle.py scripts/check_starter_bundle.py
